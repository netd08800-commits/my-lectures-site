<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Мои лекции</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
    }
    .item {
      background: white;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    button {
      padding: 5px 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>📚 Лекции</h1>

<div id="list"></div>

<script>
const data = [
  "Первая лекция",
  "Вторая лекция",
  "Третья лекция"
];

const list = document.getElementById("list");

data.forEach(text => {
  const div = document.createElement("div");
  div.className = "item";

  const span = document.createElement("span");
  span.textContent = text;

  const btn = document.createElement("button");
  btn.textContent = "Скопировать";
  btn.onclick = () => {
    navigator.clipboard.writeText(text);
    btn.textContent = "Скопировано!";
    setTimeout(() => btn.textContent = "Скопировать", 1000);
  };

  div.appendChild(span);
  div.appendChild(btn);
  list.appendChild(div);
});
</script>

</body>
</html>
