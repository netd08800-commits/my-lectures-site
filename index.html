<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Мои лекции</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f3f5f9;
}

/* HEADER */
.header {
  background: linear-gradient(90deg, #1e1e2f, #3a3a6a);
  color: white;
  padding: 20px;
  font-size: 22px;
}

/* CONTAINER */
.container {
  display: flex;
  gap: 20px;
  padding: 20px;
}

/* SIDEBAR */
.sidebar {
  width: 250px;
  background: white;
  border-radius: 12px;
  padding: 15px;
}

.sidebar h3 {
  margin-top: 0;
}

.category {
  padding: 8px;
  border-radius: 8px;
  cursor: pointer;
}

.category:hover {
  background: #eee;
}

/* MAIN */
.main {
  flex: 1;
}

/* SEARCH */
.search {
  margin-bottom: 15px;
}

.search input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* CARD */
.card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* BUTTON */
button {
  background: #6c63ff;
  border: none;
  color: white;
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}
</style>
</head>

<body>

<div class="header">
  📚 Мои лекции
</div>

<div class="container">

  <div class="sidebar">
    <h3>Категории</h3>
    <div class="category">Все лекции</div>
    <div class="category">Программирование</div>
    <div class="category">Математика</div>
    <div class="category">Алгоритмы</div>
  </div>

  <div class="main">

    <div class="search">
      <input type="text" id="search" placeholder="Поиск...">
    </div>

    <div id="list"></div>

  </div>

</div>

<script>
const API = "https://api-lectures.netd08800.workers.dev";

const list = document.getElementById("list");
const searchInput = document.getElementById("search");

let allData = [];

async function loadData() {
  const res = await fetch(API + "/api/get");
  allData = await res.json();
  render(allData);
}

function render(items) {
  list.innerHTML = "";

  items.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";

    const span = document.createElement("span");
    span.textContent = item.text;

    const btn = document.createElement("button");
    btn.textContent = "Скопировать";

    btn.onclick = () => {
      navigator.clipboard.writeText(item.text);
      btn.textContent = "✔";
      setTimeout(() => btn.textContent = "Скопировать", 1000);
    };

    div.appendChild(span);
    div.appendChild(btn);
    list.appendChild(div);
  });
}

searchInput.addEventListener("input", () => {
  const value = searchInput.value.toLowerCase();
  const filtered = allData.filter(item =>
    item.text.toLowerCase().includes(value)
  );
  render(filtered);
});

loadData();
</script>
</body>
</html>
